services:
  db:
    image: mariadb:11.4
    container_name: cvhq-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: anvwclyo_cvhq
      MARIADB_USER: cvhq
      MARIADB_PASSWORD: cvhq_secret
      MARIADB_ROOT_PASSWORD: root_secret
    ports:
      - "33060:3306"
    volumes:
      - dbdata:/var/lib/mysql
      # Imported automatically on first boot (empty data dir only)
      - ./anvwclyo_cvhq.sql:/docker-entrypoint-initdb.d/01-anvwclyo_cvhq.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cvhq-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: anvwclyo_cvhq
      DB_USERNAME: cvhq
      DB_PASSWORD: cvhq_secret
    ports:
      - "8000:8000"

volumes:
  dbdata:
